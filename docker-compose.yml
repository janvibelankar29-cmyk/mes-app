# ==========================================
# MES Application - Docker Compose Setup
# ==========================================
# This file orchestrates the entire MES stack for production deployment.
# It includes the Node.js backend, React frontend (Nginx), PostgreSQL, and Redis.

version: '3.8'

services:
  # --------------------------------
  # PostgreSQL Database
  # --------------------------------
  db:
    image: postgres:15-alpine
    container_name: mes-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mes_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically initialize schema on first boot
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./server/config/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    networks:
      - mes-network

  # --------------------------------
  # Redis for Socket.io Scalability
  # --------------------------------
  redis:
    image: redis:7-alpine
    container_name: mes-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - mes-network

  # --------------------------------
  # Node.js Backend Server
  # --------------------------------
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mes-server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-mes_db}
      - REDIS_URL=redis://redis:6379
      - SOCKET_CORS_ORIGIN=http://localhost
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    networks:
      - mes-network

  # --------------------------------
  # React Frontend (Nginx)
  # --------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mes-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - mes-network

networks:
  mes-network:
    driver: bridge

volumes:
  pgdata:
